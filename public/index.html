<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Nexomed - Contas a Receber</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
    <meta name="description" content="Sistema de Contas a Receber - Nexomed SGC Financeiro">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nexo: {
                            50:  '#e0f7fa',
                            100: '#b2ebf2',
                            200: '#80deea',
                            300: '#4dd0e1',
                            400: '#26c6da',
                            500: '#0097A7',
                            600: '#00838F',
                            700: '#006064',
                            800: '#004D40',
                            900: '#003330',
                        },
                        steel: {
                            400: '#9ca3af',
                            500: '#6b7280',
                            600: '#4b5563',
                            700: '#374151',
                            800: '#1f2937',
                            900: '#111827',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Animação suave de fade-in */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }
        .animate-fade-in-up-delay {
            animation: fadeInUp 0.6s 0.15s ease-out forwards;
            opacity: 0;
        }
        .animate-fade-in-up-delay-2 {
            animation: fadeInUp 0.6s 0.3s ease-out forwards;
            opacity: 0;
        }

        /* Input focus glow */
        .input-nexo:focus {
            box-shadow: 0 0 0 3px rgba(0, 151, 167, 0.15);
        }
        .input-nexo::placeholder {
            color: #9ca3af;
            font-weight: 300;
        }

        /* Button ripple */
        .btn-nexo {
            position: relative;
            overflow: hidden;
        }
        .btn-nexo::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 60%);
        }
    </style>
</head>
<body class="h-full font-sans">

    <!-- Layout: Imagem de fundo à esquerda, formulário à direita -->
    <div class="flex h-full">

        <!-- Painel Esquerdo: Imagem de fundo (responsiva para HD+) -->
        <div class="hidden lg:flex lg:w-1/2 xl:w-3/5 2xl:w-2/3 relative overflow-hidden transition-all duration-300">
            <img src="/assets/images/login.png" alt="Nexomed" 
                 class="absolute inset-0 w-full h-full object-cover object-center"
                 sizes="(min-width: 1024px) 50vw, (min-width: 1280px) 60vw, (min-width: 1536px) 66vw">
            <!-- Overlay escuro sutil para contraste -->
            <div class="absolute inset-0 bg-gradient-to-r from-steel-900/60 via-steel-900/30 to-transparent"></div>
        </div>

        <!-- Painel Direito: Formulário de Login -->
        <div class="w-full lg:w-1/2 xl:w-2/5 2xl:w-1/3 flex flex-col items-center justify-center bg-white px-8 sm:px-16 relative transition-all duration-300">

            <!-- Logo -->
            <div class="mb-10 animate-fade-in-up">
                <img src="/assets/images/logo.png" alt="Nexomed" class="h-12">
            </div>

            <!-- Cabeçalho -->
            <div class="w-full max-w-sm mb-8 animate-fade-in-up-delay">
                <h1 class="text-2xl font-semibold text-steel-800 tracking-tight">Bem-vindo de volta</h1>
                <p class="text-steel-400 text-sm mt-1">Acesse o painel de Contas a Receber</p>
            </div>

            <!-- Formulário -->
            <form id="loginForm" class="w-full max-w-sm space-y-5 animate-fade-in-up-delay-2">
                <div>
                    <label for="email" class="block text-xs font-medium text-steel-500 uppercase tracking-wider mb-2">Email</label>
                    <input 
                        type="email" id="email" name="email" required autocomplete="email"
                        class="input-nexo w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-steel-800 text-sm outline-none transition-all duration-200 focus:border-nexo-500 focus:bg-white"
                        placeholder="seu@email.com">
                </div>

                <div>
                    <label for="password" class="block text-xs font-medium text-steel-500 uppercase tracking-wider mb-2">Senha</label>
                    <div class="relative">
                        <input 
                            type="password" id="password" name="password" required autocomplete="current-password"
                            class="input-nexo w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-steel-800 text-sm outline-none transition-all duration-200 focus:border-nexo-500 focus:bg-white pr-12"
                            placeholder="••••••••">
                        <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-steel-400 hover:text-nexo-500 transition-colors" tabindex="-1">
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Mensagem de Erro -->
                <div id="errorMessage" class="hidden">
                    <div class="flex items-center gap-2 px-4 py-3 bg-red-50 border border-red-100 rounded-xl text-red-600 text-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                        </svg>
                        <span id="errorText">Credenciais inválidas</span>
                    </div>
                </div>

                <!-- Botão de Login -->
                <button type="submit" id="submitBtn"
                    class="btn-nexo w-full bg-nexo-500 hover:bg-nexo-600 text-white font-medium py-3 px-4 rounded-xl transition-all duration-200 active:scale-[0.98] flex justify-center items-center gap-2 shadow-lg shadow-nexo-500/20 mt-2">
                    <span id="btnText">Entrar</span>
                    <svg id="loadingSpinner" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>

            <!-- Footer -->
            <div class="absolute bottom-6 text-center text-xs text-steel-400">
                &copy; <span id="footerYear">2026</span> All Rights Reserved &mdash; Desenvolvido com ☕ por <a href="https://www.linkedin.com/in/davi-almeidaa/" target="_blank" rel="noopener noreferrer" class="text-nexo-500 hover:text-nexo-600 font-medium transition-colors">Davi Almeida</a>
            </div>
        </div>
    </div>

    <script>
        // Ano dinâmico no footer
        document.getElementById('footerYear').textContent = new Date().getFullYear();
    </script>

    <script src="/js/login.js"></script>
</body>
</html>
