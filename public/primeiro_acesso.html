<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiro Acesso - Nexomed</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
    <meta name="description" content="Sistema de Contas a Receber - Nexomed SGC Financeiro">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nexo: {
                            50:  '#e0f7fa',
                            100: '#b2ebf2',
                            200: '#80deea',
                            300: '#4dd0e1',
                            400: '#26c6da',
                            500: '#0097A7',
                            600: '#00838F',
                            700: '#006064',
                            800: '#004D40',
                            900: '#003330',
                        },
                        steel: {
                            400: '#9ca3af',
                            500: '#6b7280',
                            600: '#4b5563',
                            700: '#374151',
                            800: '#1f2937',
                            900: '#111827',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Animação suave de fade-in */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }
        .animate-fade-in-up-delay {
            animation: fadeInUp 0.6s 0.15s ease-out forwards;
            opacity: 0;
        }
        .animate-fade-in-up-delay-2 {
            animation: fadeInUp 0.6s 0.3s ease-out forwards;
            opacity: 0;
        }

        /* Input focus glow */
        .input-nexo:focus {
            box-shadow: 0 0 0 3px rgba(0, 151, 167, 0.15);
        }
        .input-nexo::placeholder {
            color: #9ca3af;
            font-weight: 300;
        }

        /* Button ripple */
        .btn-nexo {
            position: relative;
            overflow: hidden;
        }
        .btn-nexo::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 60%);
        }
    </style>
</head>
<body class="h-full font-sans">

    <!-- Layout: Imagem de fundo à esquerda, formulário à direita -->
    <div class="flex h-full">

        <!-- Painel Esquerdo: Imagem de fundo (responsiva para HD+) -->
        <div class="hidden lg:flex lg:w-1/2 xl:w-3/5 2xl:w-2/3 relative overflow-hidden transition-all duration-300">
            <img src="/assets/images/login.png" alt="Nexomed" 
                 class="absolute inset-0 w-full h-full object-cover object-center"
                 sizes="(min-width: 1024px) 50vw, (min-width: 1280px) 60vw, (min-width: 1536px) 66vw">
            <!-- Overlay escuro sutil para contraste -->
            <div class="absolute inset-0 bg-gradient-to-r from-steel-900/60 via-steel-900/30 to-transparent"></div>
        </div>

        <!-- Painel Direito: Formulário de Login -->
        <div class="w-full lg:w-1/2 xl:w-2/5 2xl:w-1/3 flex flex-col items-center justify-center bg-white px-8 sm:px-16 relative transition-all duration-300">

            <!-- Logo -->
            <div class="mb-10 animate-fade-in-up">
                <img src="/assets/images/logo.png" alt="Nexomed" class="h-12">
            </div>

            <!-- Header -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-nexo-50 dark:bg-nexo-900/30 text-nexo-600 dark:text-nexo-400 mb-4 shadow-sm border border-nexo-100 dark:border-nexo-800/50">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-steel-900 dark:text-white tracking-tight">Primeiro Acesso</h2>
                <p class="text-sm text-steel-500 dark:text-steel-400 mt-2 font-medium">Crie sua senha definitiva para acessar o sistema.</p>
            </div>

            <div id="errorMessage" class="hidden mb-6 bg-red-50 dark:bg-red-900/20 border-l-4 border-red-500 p-4 rounded-md animate-fade-in-up">
                <div class="flex items-center">
                    <svg class="h-5 w-5 text-red-500 dark:text-red-400 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <p id="errorText" class="text-sm text-red-700 dark:text-red-400 font-medium"></p>
                </div>
            </div>

            <form id="firstAccessForm" class="space-y-6">
                <div class="space-y-1.5">
                    <label for="newPassword" class="block text-sm font-semibold text-steel-700 dark:text-steel-300">Nova Senha</label>
                    <input id="newPassword" name="password" type="password" required 
                           class="w-full px-4 py-2.5 bg-gray-50 dark:bg-steel-900/50 border border-gray-200 dark:border-steel-700 rounded-lg text-steel-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-nexo-500/20 focus:border-nexo-500 transition-all shadow-sm placeholder-steel-400 dark:placeholder-steel-500" 
                           placeholder="Mínimo de 6 caracteres" minlength="6">
                </div>

                <div class="space-y-1.5">
                    <label for="confirmPassword" class="block text-sm font-semibold text-steel-700 dark:text-steel-300">Confirmar Nova Senha</label>
                    <input id="confirmPassword" name="confirmPassword" type="password" required 
                           class="w-full px-4 py-2.5 bg-gray-50 dark:bg-steel-900/50 border border-gray-200 dark:border-steel-700 rounded-lg text-steel-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-nexo-500/20 focus:border-nexo-500 transition-all shadow-sm placeholder-steel-400 dark:placeholder-steel-500" 
                           placeholder="Repita a nova senha" minlength="6">
                </div>

                <button type="submit" id="submitBtn" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm shadow-nexo-500/30 text-sm font-semibold text-white bg-nexo-600 hover:bg-nexo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-nexo-500 transition-all active:scale-[0.98]">
                    <svg id="loadingSpinner" class="hidden animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span id="btnText">Salvar Senha e Acessar</span>
                </button>
            </form>

            <!-- Footer -->
            <div class="absolute bottom-6 text-center text-xs text-steel-400">
                &copy; <span id="footerYear">2026</span> All Rights Reserved &mdash; Desenvolvido com ☕ por <a href="https://www.linkedin.com/in/davi-almeidaa/" target="_blank" rel="noopener noreferrer" class="text-nexo-500 hover:text-nexo-600 font-medium transition-colors">Davi Almeida</a>
            </div>
        </div>
    </div>

    <script>
        // Ano dinâmico no footer
        document.getElementById('footerYear').textContent = new Date().getFullYear();
    </script>
    <!-- Script do Primeiro Acesso -->
    <script src="/js/primeiro_acesso.js"></script>
</body>
</html>
