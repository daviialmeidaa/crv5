version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nexomed_db
    environment:
      POSTGRES_USER: ${PG_USER:-nexomed}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-nexomed123}
      POSTGRES_DB: ${PG_DATABASE:-nexomed_auth}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build: .
    container_name: nexomed_app
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      PG_HOST: db
      PG_PORT: 5432
      PG_USER: ${PG_USER:-nexomed}
      PG_PASSWORD: ${PG_PASSWORD:-nexomed123}
      PG_DATABASE: ${PG_DATABASE:-nexomed_auth}
      SUPRA_USER: ${SUPRA_USER}
      SUPRA_PASSWORD: ${SUPRA_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
